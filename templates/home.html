<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Performance Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        -45deg,
        #0f172a,
        #1e293b,
        #312e81,
        #0f172a
    );
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
    padding:30px;
}

@keyframes gradient{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

.container{
    width:100%;
    max-width:950px;

    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:25px;

    padding:40px;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.4);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:white;
    font-size:2.5rem;
    margin-bottom:10px;
}

.header p{
    color:#cbd5e1;
}

form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    color:white;
    margin-bottom:8px;
    font-weight:500;
}

select,input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
}

option{
    color:black;
}

input::placeholder{
    color:#d1d5db;
}

.full-width{
    grid-column:span 2;
}

button{
    width:100%;
    padding:16px;

    border:none;
    border-radius:14px;

    background:linear-gradient(
    135deg,
    #6366f1,
    #8b5cf6
    );

    color:white;
    font-size:17px;
    font-weight:600;

    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(99,102,241,.4);
}

.result-card{
    margin-top:30px;

    text-align:center;

    background:rgba(255,255,255,0.08);

    padding:25px;

    border-radius:20px;

    border:1px solid rgba(255,255,255,0.1);
}

.result-card h2{
    color:#94a3b8;
    margin-bottom:10px;
}

.result{
    font-size:3rem;
    color:#22c55e;
    font-weight:700;
}

.badge{
    display:inline-block;
    margin-top:10px;
    padding:8px 15px;

    background:#22c55e20;
    color:#22c55e;

    border-radius:30px;
}

@media(max-width:768px){

form{
grid-template-columns:1fr;
}

.full-width{
grid-column:span 1;
}

.header h1{
font-size:2rem;
}

.result{
font-size:2.3rem;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>📊 Student Performance Predictor</h1>
<p>Machine Learning Powered Maths Score Prediction</p>
</div>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<div class="input-group">
<label>Gender</label>
<select name="gender" required>
<option disabled selected>Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</div>

<div class="input-group">
<label>Race / Ethnicity</label>
<select name="ethnicity" required>
<option disabled selected>Select Group</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>
</div>

<div class="input-group">
<label>Parental Education</label>
<select name="parental_level_of_education" required>
<option disabled selected>Select Education</option>
<option value="associate's degree">Associate Degree</option>
<option value="bachelor's degree">Bachelor Degree</option>
<option value="master's degree">Master Degree</option>
<option value="high school">High School</option>
<option value="some college">Some College</option>
<option value="some high school">Some High School</option>
</select>
</div>

<div class="input-group">
<label>Lunch Type</label>
<select name="lunch" required>
<option disabled selected>Select Lunch Type</option>
<option value="standard">Standard</option>
<option value="free/reduced">Free / Reduced</option>
</select>
</div>

<div class="input-group">
<label>Test Preparation</label>
<select name="test_preparation_course" required>
<option disabled selected>Select Option</option>
<option value="completed">Completed</option>
<option value="none">None</option>
</select>
</div>

<div class="input-group">
<label>Reading Score</label>
<input
type="number"
name="reading_score"
min="0"
max="100"
placeholder="Enter Reading Score"
required>
</div>

<div class="input-group full-width">
<label>Writing Score</label>
<input
type="number"
name="writing_score"
min="0"
max="100"
placeholder="Enter Writing Score"
required>
</div>

<div class="full-width">
<button type="submit">
🚀 Predict Maths Score
</button>
</div>

</form>

{% if results %}

<div class="result-card">

<h2>Predicted Maths Score</h2>

<div class="result">
{{ "%.2f"|format(results) }}
</div>

<div class="badge">
AI Prediction Complete
</div>

</div>

{% endif %}

</div>

</body>
</html>
